<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #map-container {
            position: relative;
            display: inline-block; /* O contêiner se ajusta ao tamanho do conteúdo */
            margin-right: 0.5cm;
        }
        #map {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .vertical-element-container {
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }
        .container-button {
            margin-top: 0.4cm;
            margin-bottom: 0.8cm;
        }
        #st-sp-container {
            display: flex;
            justify-content: center;
            flex-direction: row;
        }
        #start {
            margin-right: 0.5cm;
        }
        .button-grid {
            position: absolute;
            top: 0;
            left: 0;
            display: grid;
            width: 100%;
            height: 100%;
        }
        .grid-button {
            background-color: transparent;
            border: none;
            transition: background-color 0.3s;
            box-sizing: border-box; /* Inclui padding e borda no tamanho total do botão */
            padding: 0;
            font-size: 14px;
            color: white;
        }
        .grid-button.selected {
            background-color: rgba(255, 0, 0, 0.5);
            border: none;
            box-sizing: border-box; /* Inclui padding e borda no tamanho total do botão */
            padding: 0;
            color: black;
        }
    </style>
</head>

<body>

<div id="map-container">
    <img id="map" src="static/mapa.svg" alt="Mapa SVG">
    <div class="button-grid">
        <!-- Botões gerados por JavaScript -->
    </div>
</div>

<div class="vertical-element-container">

    <div class="vertical-element-container">
        <input id="x-origem" type="number" style="width: 100px;" placeholder="X Origem" min="0">
        <input id="y-origem" type="number" style="width: 100px;" placeholder="Y Origem" min="0">
        <button id="submit-origem" class="container-button"> Enviar Origem </button>
    </div>

    <button id="submit-trajectory"> Enviar Trajetória </button>
    <button id="clear" class="container-button"> Limpar Trajetória </button>

    <div id="st-sp-container">    
        <button id="start"> Iniciar </button>
        <button id="stop"> Parar </button>
    </div>

    <form action=/get-grafico method=get enctype=multipart/form-data>
        <input id='grafico' type=submit value="Grafico trajetória" class="container-button">
    </form>
</div>

<script>
    const grid = document.querySelector('.button-grid');
    const mapImage = document.getElementById('map');
    let selectedPoints = [];

    const resolucaoHorizontal = 20, resolucaoVertical = 20; // dimensoes do carrinho, em CM
    var numColumns = 0, numRows = 0;

    function adjustGridSize() {
        const svgWidth = mapImage.clientWidth;
        const svgHeight = mapImage.clientHeight;

        const btnWidth = svgWidth / numColumns;
        const btnHeight = svgHeight / numRows;
            
        grid.style.width = `${svgWidth}px`;
        grid.style.height = `${svgHeight}px`;
        grid.style.gridTemplateColumns = `repeat(${numColumns}, ${btnWidth}px)`;
        grid.style.gridTemplateRows = `repeat(${numRows}, ${btnHeight}px)`;

        // Remover botões existentes antes de recriar a matriz
        grid.innerHTML = '';

        // Criar botões na nova grade ajustada
        for (let i = 0; i < numRows * numColumns; i++) {
            const button = document.createElement('button');
            button.classList.add('grid-button');
            button.style.width = `${btnWidth}px`;
            button.style.height = `${btnHeight}px`;

            const row = numRows - Math.floor(i / numColumns); // Calcular linha
            const col = 1 + i % numColumns; // Calcular coluna

            button.addEventListener('click', function() {
                const point = [col * resolucaoHorizontal, row * resolucaoVertical]; // Coordenadas relativas
                const existingIndex = selectedPoints.findIndex(p => p[0] === point[0] && p[1] === point[1]);

                if (existingIndex > -1) {
                    selectedPoints.splice(existingIndex, 1);
                } else {
                    selectedPoints.push(point);
                }

                updateButtonStyles();
            });
            grid.appendChild(button);
        }
    }

    function updateButtonStyles() {
        const buttons = document.querySelectorAll('.grid-button');
        buttons.forEach(button => button.classList.remove('selected'));
        buttons.forEach((button, index) => {
            const row = numRows - Math.floor(index / numColumns);
            const col = 1 + index % numColumns;
            const point = [col * resolucaoHorizontal, row * resolucaoVertical];
            const selectedIndex = selectedPoints.findIndex(p => p[0] === point[0] && p[1] === point[1]);

            if (selectedIndex > -1) {
                button.classList.add('selected');
                button.textContent = selectedIndex + 1;

                // Ajustar o tamanho do texto para se adequar ao botão
                const fontSize = Math.min(button.clientWidth, button.clientHeight) * 1.0;
                button.style.fontSize = `${fontSize}px`;

                // Alterar a cor do botão com base na posição na lista de selecionados
                button.style.backgroundColor = getRainbowColor(selectedIndex, selectedPoints.length);
            } else {
                button.textContent = '';
                button.style.backgroundColor = 'transparent';
            }
        });
    }

    // Função para gerar a cor do arco-íris
    function getRainbowColor(index, total) {
        const hue = (index / total) * 240; // De 0 (vermelho) a 240 (azul) no espectro de cores HSV
        return `hsl(${hue}, 100%, 50%)`;
    }

    // Ajustar tamanho da grade quando o SVG carregar
    mapImage.onload = function() {
        fetch('/get-configs')
        .then(response => response.json())
        .then(config => {
            document.getElementById("x-origem").max = config.widthCm;
            document.getElementById("y-origem").max = config.heightCm;
            numColumns = Math.floor(config.widthCm / resolucaoHorizontal);
            numRows = Math.floor(config.heightCm / resolucaoVertical);
            adjustGridSize();
        })
        .catch(error => console.error('Erro ao ler as configurações:', error));
    };

    window.addEventListener('resize', adjustGridSize);

    const submitOrigin = document.getElementById('submit-origem');

    submitOrigin.addEventListener('click', function() {
        fetch('/set-origin', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ origin: [Number(document.getElementById("x-origem").value), Number(document.getElementById("y-origem").value)] })
        })
        .then(response => response.text())
        .then(data => {
            alert(data);
            console.log(typeof document.getElementById("x-origem").value)
        })
        .catch(error => {
            console.error('Não foi possível iniciar o robô.', error);
        });
    });

    const submitTrajectoryButton = document.getElementById('submit-trajectory');
    const clearButton = document.getElementById('clear');

    // Evento para enviar a trajetória
    submitTrajectoryButton.addEventListener('click', function() {
        fetch('/submit-trajectory', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ trajectory: selectedPoints })
        })
        .then(response => response.json())
        .then(data => {
            alert('Trajetória enviada com sucesso!');
        })
        .catch(error => {
            console.error('Erro ao enviar a trajetória:', error);
        });
    });

    // Evento para limpar a trajetória
    clearButton.addEventListener('click', function() {
        selectedPoints = [];
        updateButtonStyles();
    });

    const startButton = document.getElementById('start');
    const stopButton = document.getElementById('stop');

    startButton.addEventListener('click', function() {
        fetch('/start-stop', {
            method: 'POST',
            headers: {
                'Content-Type': 'text/javascript'
            },
            body: 'start'
        })
        .then(response => response.text())
        .then(data => {
            alert(data);
        })
        .catch(error => {
            console.error('Não foi possível iniciar o robô.', error);
        });
    });

    stopButton.addEventListener('click', function() {
        fetch('/start-stop', {
            method: 'POST',
            headers: {
                'Content-Type': 'text/javascript'
            },
            body: 'stop'
        })
        .then(response => response.text())
        .then(data => {
            alert(data);
        })
        .catch(error => {
            console.error('Não foi possível parar o robô.', error);
        });
    });
</script>
</body>
</html>
