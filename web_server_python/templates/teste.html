<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trajetória Robô</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #map {
            position: relative;
            /* Largura e altura ajustadas dinamicamente via JavaScript */
        }
        .point {
            width: 8px;
            height: 8px;
            background-color: red;
            border-radius: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 10; /* Garante que os pontos fiquem acima do SVG */
        }
    </style>
</head>
<body>

<div id="map">
    <!-- Use <img> ou <svg> diretamente -->
    <img id="planta-svg" src="static\output.svg">
</div>

<button id="submit">Enviar Trajetória</button>
<button id="clear">Limpar Trajetória</button>

<script>
    const map = document.getElementById('map');
    const svgImage = document.getElementById('planta-svg');
    const submitButton = document.getElementById('submit');
    const clearButton = document.getElementById('clear');
    let selectedPoints = [];

    // Ajusta o tamanho do #map com base no tamanho da imagem SVG
    svgImage.onload = function() {
        map.style.width = svgImage.clientWidth + 'px';
        map.style.height = svgImage.clientHeight + 'px';
    };

    map.addEventListener('click', function(event) {
        const rect = map.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;

        // Criar um ponto visual
        const point = document.createElement('div');
        point.classList.add('point');
        point.style.left = `${x}px`;
        point.style.top = `${y}px`;
        map.appendChild(point);

        // Armazenar o ponto
        selectedPoints.push({x: x, y: y});
    });

    submitButton.addEventListener('click', function() {
        fetch('/submit-trajectory', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ trajectory: selectedPoints })
        })
        .then(response => response.json())
        .then(data => {
            alert('Trajetória enviada com sucesso!');
        })
        .catch(error => {
            console.error('Erro ao enviar a trajetória:', error);
        });
    });

    clearButton.addEventListener('click', function() {
        // Limpa todos os pontos marcados no mapa
        selectedPoints = [];
        const points = document.querySelectorAll('.point');
        points.forEach(point => point.remove());
    });
</script>

</body>
</html>
