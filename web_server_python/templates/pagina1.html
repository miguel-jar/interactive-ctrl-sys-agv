<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trajectory Map</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            justify-content: center;
        }
        #map {
            display: grid;
            grid-template-columns: repeat(32, 20px);
            gap: 2px;
            margin-bottom: 20px;
        }
        .point {
            width: 20px;
            height: 20px;
            background-color: #ccc;
            border: 1px solid #999;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .point.selected {
            background-color: #007bff;
        }
        .button-container {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        button#clear {
            background-color: #dc3545;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="button-container">
    <button id="submit" disabled>Enviar Trajetória</button>
    <button id="clear">Limpar Trajetória</button>
</div>

<script>
    const map = document.getElementById('map');
    const submitButton = document.getElementById('submit');
    const clearButton = document.getElementById('clear');
    const points = [];

    const rowNumber = 32
    const columnNumber = 32

    // Cria a matriz de pontos (32x32)
    for (let i = 0; i < rowNumber; i++) {
        points[i] = [];
        for (let j = 0; j < columnNumber; j++) {
            const point = document.createElement('div');
            point.classList.add('point');
            point.dataset.x = i;
            point.dataset.y = j;

            point.addEventListener('click', function () {
                point.classList.toggle('selected');
                checkSelection();
            });

            points[i][j] = point;
            map.appendChild(point);
        }
    }

    function checkSelection() {
        const hasSelected = map.querySelector('.selected') !== null;
        submitButton.disabled = !hasSelected;
    }

    // Função para coletar os pontos selecionados
    function getSelectedPoints() {
        const selectedPoints = [];
        points.forEach(row => {
            row.forEach(point => {
                if (point.classList.contains('selected')) {
                    selectedPoints.push({ x: point.dataset.x, y: point.dataset.y });
                }
            });
        });
        return selectedPoints;
    }

    // Envia os dados para o servidor
    submitButton.addEventListener('click', function () {
        const selectedPoints = getSelectedPoints();
        fetch('/submit-trajectory', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ trajectory: selectedPoints })
        })
        .then(response => response.json())
        .then(data => {
            alert('Trajetória enviada com sucesso!');
        })
        .catch(error => {
            console.error('Erro ao enviar a trajetória:', error);
        });
    });

    // Limpa a trajetória selecionada
    clearButton.addEventListener('click', function () {
        points.forEach(row => {
            row.forEach(point => {
                point.classList.remove('selected');
            });
        });
        checkSelection();
    });
</script>

</body>
</html>
