<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriz de Botões sobre SVG</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #map-container {
            position: relative;
            display: inline-block; /* O contêiner se ajusta ao tamanho do conteúdo */
        }
        #map {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .button-grid {
            position: absolute;
            top: 0;
            left: 0;
            display: grid;
            width: 100%;
            height: 100%;
        }
        .grid-button {
            background-color: transparent;
            border: none;
            transition: background-color 0.3s;
            box-sizing: border-box; /* Inclui padding e borda no tamanho total do botão */
            padding: 0;
        }
        .grid-button.selected {
            background-color: rgba(255, 0, 0, 0.5);
            border: none;
            box-sizing: border-box; /* Inclui padding e borda no tamanho total do botão */
            padding: 0;
        }
    </style>
</head>
<body>

<div id="map-container">
    <img id="map" src="static/output.svg" alt="Mapa SVG">
    <div class="button-grid">
        <!-- Botões gerados por JavaScript -->
    </div>
</div>

<button id="submit">Enviar Trajetória</button>
<button id="clear">Limpar Trajetória</button>

<button id="start">Iniciar</button>
<button id="stop">Parar</button>

<script>
    const grid = document.querySelector('.button-grid');
    const mapImage = document.getElementById('map');
    let selectedPoints = [];

    const ResolucaoCm = 20;
    var numColumns = 0, numRows = 0;

    fetch('/get-configs')
        .then(response => response.json())
        .then(config => {            
            numColumns = Math.floor(config.widthCm / ResolucaoCm) + 1;  // +1 pra ter um bloco 0,0
            numRows = Math.floor(config.heightCm / ResolucaoCm) + 1;
        })
        .catch(error => console.error('Erro ao ler as configurações:', error));

    function adjustGridSize() {
        const svgWidth = mapImage.clientWidth;
        const svgHeight = mapImage.clientHeight;

        const btnWidth = svgWidth / numColumns;
        const btnHeight = svgHeight / numRows;
            
        grid.style.width = `${svgWidth}px`;
        grid.style.height = `${svgHeight}px`;
        grid.style.gridTemplateColumns = `repeat(${numColumns}, ${btnWidth}px)`;
        grid.style.gridTemplateRows = `repeat(${numRows}, ${btnHeight}px)`;

        // Remover botões existentes antes de recriar a matriz
        grid.innerHTML = '';

        // Criar botões na nova grade ajustada
        for (let i = 0; i < numRows * numColumns; i++) {
            const button = document.createElement('button');
            button.classList.add('grid-button');
            button.style.width = `${btnWidth}px`;
            button.style.height = `${btnHeight}px`;

            const row = Math.floor(i / numColumns); // Calcular linha
            const col = i % numColumns; // Calcular coluna

            button.addEventListener('click', function() {
                button.classList.toggle('selected');
                const point = [row * ResolucaoCm, col * ResolucaoCm]; // Coordenadas relativas

                // Verificar se o ponto já foi selecionado
                const existingIndex = selectedPoints.findIndex(p => p[0] === point[0] && p[1] === point[1]);
                if (existingIndex > -1) {
                    selectedPoints.splice(existingIndex, 1);
                } else {
                    selectedPoints.push(point);
                }
            });
            grid.appendChild(button);
        }
    }

    // Ajustar tamanho da grade quando o SVG carregar
    mapImage.onload = function() {
        adjustGridSize();
    };

    window.addEventListener('resize', adjustGridSize);

    const startButton = document.getElementById('start');
    const stopButton = document.getElementById('stop');
    const submitButton = document.getElementById('submit');
    const clearButton = document.getElementById('clear');

    startButton.addEventListener('click', function() {
        fetch('/start-stop', {
            method: 'POST',
            headers: {
                'Content-Type': 'text/javascript'
            },
            body: 'start'
        })
        .then(response => response.text())
        .then(data => {
            alert(data);
        })
        .catch(error => {
            console.error('Não foi possível iniciar o robô.', error);
        });
    });

    stopButton.addEventListener('click', function() {
        fetch('/start-stop', {
            method: 'POST',
            headers: {
                'Content-Type': 'text/javascript'
            },
            body: 'stop'
        })
        .then(response => response.text())
        .then(data => {
            alert(data);
        })
        .catch(error => {
            console.error('Não foi possível parar o robô.', error);
        });
    });

    // Evento para enviar a trajetória
    submitButton.addEventListener('click', function() {
        fetch('/submit-trajectory', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ trajectory: selectedPoints })
        })
        .then(response => response.json())
        .then(data => {
            alert('Trajetória enviada com sucesso!');
        })
        .catch(error => {
            console.error('Erro ao enviar a trajetória:', error);
        });
    });

    // Evento para limpar a trajetória
    clearButton.addEventListener('click', function() {
        selectedPoints = [];
        const buttons = document.querySelectorAll('.grid-button');
        buttons.forEach(button => button.classList.remove('selected'));
    });
</script>

</body>
</html>
