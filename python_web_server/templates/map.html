<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Map</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #map-container {
            position: relative;
            display: inline-block;
            /* Container fits content size */
            margin-right: 0.5cm;
        }

        #map {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .vertical-element-container {
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }

        .container-button {
            margin-top: 0.4cm;
            margin-bottom: 0.8cm;
        }

        #st-sp-container {
            display: flex;
            justify-content: center;
            flex-direction: row;
        }

        #start {
            margin-right: 0.5cm;
        }

        .button-grid {
            position: absolute;
            top: 0;
            left: 0;
            display: grid;
            width: 100%;
            height: 100%;
        }

        .grid-button {
            background-color: transparent;
            border: none;
            transition: background-color 0.3s;
            box-sizing: border-box;
            /* Includes padding and border in total size */
            padding: 0;
            font-size: 14px;
            color: white;
        }

        .grid-button.selected {
            background-color: rgba(255, 0, 0, 0.5);
            border: none;
            box-sizing: border-box;
            padding: 0;
            color: black;
        }
    </style>
</head>

<body>

    <div id="map-container">
        <img id="map" src="{{url_for('static', filename='map.svg')}}" alt="Map SVG">
        <div class="button-grid">
        </div>
    </div>

    <div class="vertical-element-container">

        <div class="vertical-element-container">
            <input id="x-origin" type="number" style="width: 100px;" placeholder="X Origin" min="0">
            <input id="y-origin" type="number" style="width: 100px;" placeholder="Y Origin" min="0">
            <button id="submit-origin" class="container-button"> Send Origin </button>
        </div>

        <button id="submit-trajectory"> Send Trajectory </button>
        <button id="clear" class="container-button"> Clear Trajectory </button>

        <div id="st-sp-container">
            <button id="start"> Start </button>
            <button id="stop"> Stop </button>
        </div>

        <form action="{{url_for('get_chart')}}" method="get" enctype="multipart/form-data">
            <input id="graph-btn" type="submit" value="Map of the last traveled route" class="container-button">
        </form>
    </div>

    <script>
        const grid = document.querySelector('.button-grid');
        const mapImage = document.getElementById('map');
        let selectedPoints = [];

        const horizontalResolution = 20, verticalResolution = 20; // Robot dimensions in CM
        var numColumns = 0, numRows = 0;

        function adjustGridSize() {
            const svgWidth = mapImage.clientWidth;
            const svgHeight = mapImage.clientHeight;

            const btnWidth = svgWidth / numColumns;
            const btnHeight = svgHeight / numRows;

            grid.style.width = `${svgWidth}px`;
            grid.style.height = `${svgHeight}px`;
            grid.style.gridTemplateColumns = `repeat(${numColumns}, ${btnWidth}px)`;
            grid.style.gridTemplateRows = `repeat(${numRows}, ${btnHeight}px)`;

            // Remove existing buttons before recreating the grid
            grid.innerHTML = '';

            // Create buttons in the new adjusted grid
            for (let i = 0; i < numRows * numColumns; i++) {
                const button = document.createElement('button');
                button.classList.add('grid-button');
                button.style.width = `${btnWidth}px`;
                button.style.height = `${btnHeight}px`;

                const row = numRows - Math.floor(i / numColumns); // Calculate row
                const col = 1 + i % numColumns; // Calculate column

                button.addEventListener('click', function () {
                    const point = [col * horizontalResolution, row * verticalResolution]; // Relative coordinates
                    const existingIndex = selectedPoints.findIndex(p => p[0] === point[0] && p[1] === point[1]);

                    if (existingIndex > -1) {
                        selectedPoints.splice(existingIndex, 1);
                    } else {
                        selectedPoints.push(point);
                    }

                    updateButtonStyles();
                });
                grid.appendChild(button);
            }
        }

        function updateButtonStyles() {
            const buttons = document.querySelectorAll('.grid-button');
            buttons.forEach(button => button.classList.remove('selected'));
            buttons.forEach((button, index) => {
                const row = numRows - Math.floor(index / numColumns);
                const col = 1 + index % numColumns;
                const point = [col * horizontalResolution, row * verticalResolution];
                const selectedIndex = selectedPoints.findIndex(p => p[0] === point[0] && p[1] === point[1]);

                if (selectedIndex > -1) {
                    button.classList.add('selected');
                    button.textContent = selectedIndex + 1;

                    // Adjust font size to fit the button
                    const fontSize = Math.min(button.clientWidth, button.clientHeight) * 1.0;
                    button.style.fontSize = `${fontSize}px`;

                    // Change color based on list position
                    button.style.backgroundColor = getRainbowColor(selectedIndex, selectedPoints.length);
                } else {
                    button.textContent = '';
                    button.style.backgroundColor = 'transparent';
                }
            });
        }

        function getRainbowColor(index, total) {
            const hue = (index / total) * 240; // HSV spectrum (0=red, 240=blue)
            return `hsl(${hue}, 100%, 50%)`;
        }

        // Adjust grid size once SVG loads
        mapImage.onload = function () {
            fetch('/get-configs')
                .then(response => response.json())
                .then(config => {
                    document.getElementById("x-origin").max = config.width_cm;
                    document.getElementById("y-origin").max = config.height_cm;
                    numColumns = Math.floor(config.width_cm / horizontalResolution);
                    numRows = Math.floor(config.height_cm / verticalResolution);
                    adjustGridSize();
                })
                .catch(error => console.error('Error reading configurations:', error));
        };

        window.addEventListener('resize', adjustGridSize);

        const submitOrigin = document.getElementById('submit-origin');

        submitOrigin.addEventListener('click', function () {
            fetch('/set-origin', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ origin: [Number(document.getElementById("x-origin").value), Number(document.getElementById("y-origin").value)] })
            })
                .then(response => response.text())
                .then(data => {
                    alert(data);
                })
                .catch(error => {
                    console.error('Could not set robot origin.', error);
                });
        });

        const submitTrajectoryButton = document.getElementById('submit-trajectory');
        const clearButton = document.getElementById('clear');

        submitTrajectoryButton.addEventListener('click', function () {
            fetch('/submit-trajectory', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ trajectory: selectedPoints })
            })
                .then(response => response.json())
                .then(data => {
                    alert('Trajectory successfully sent!');
                })
                .catch(error => {
                    console.error('Error sending trajectory:', error);
                });
        });

        clearButton.addEventListener('click', function () {
            selectedPoints = [];
            updateButtonStyles();
        });

        const startButton = document.getElementById('start');
        const stopButton = document.getElementById('stop');

        startButton.addEventListener('click', function () {
            fetch('/start-stop', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ action: 'start' })
            })
                .then(response => response.text())
                .then(data => {
                    alert(data);
                })
                .catch(error => {
                    console.error('Could not start robot.', error);
                });
        });

        stopButton.addEventListener('click', function () {
            fetch('/start-stop', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ action: 'stop' })
            })
                .then(response => response.text())
                .then(data => {
                    alert(data);
                })
                .catch(error => {
                    console.error('Could not stop robot.', error);
                });
        });
    </script>
</body>

</html>
