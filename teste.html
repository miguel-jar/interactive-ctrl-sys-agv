<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trajectory Map</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            justify-content: center;
        }
        #map {
            position: relative;
            width: 1000px;
            height: 1000px;
            border: 1px solid #999;
            margin-bottom: 20px;
            background-color: #f1f1f1;
        }
        .point {
            width: 20px;
            height: 20px;
            background-color: #ccc;
            border: 1px solid #999;
            cursor: pointer;
            transition: background-color 0.3s;
            position: absolute;
        }
        .point.selected {
            background-color: #007bff;
        }
        .button-container {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        button#clear {
            background-color: #dc3545;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="button-container">
    <button id="submit" disabled>Enviar Trajetória</button>
    <button id="clear">Limpar Trajetória</button>
</div>

<script>
    const map = document.getElementById('map');
    const submitButton = document.getElementById('submit');
    const clearButton = document.getElementById('clear');

    // Contornos do polígono (exemplo)
    const polygon = [
      {x:130.0, y:45.0},
      {x:30.0, y:70.0},
      {x:30.0, y:0.0},
      {x:0.0, y:0.0},
      {x:0.0, y:70.0},
      {x:130.0, y:25.0},
      {x:30.0, y:25.0},
      {x:30.0, y:45.0}
    ];

    // Define a escala para ajustar a posição dos pontos na tela
    const scale = 10; // Ajuste conforme necessário

    // Função para verificar se um ponto está dentro do polígono
    function isPointInPolygon(x, y, poly) {
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            const xi = poly[i].x, yi = poly[i].y;
            const xj = poly[j].x, yj = poly[j].y;
            const intersect = ((yi > y) !== (yj > y)) &&
                              (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    // Gera pontos e verifica se estão dentro do contorno
    const xmin = 0, xmax = 130; // Limites de X
    const ymin = 0, ymax = 70; // Limites de Y
    for (let y = ymin; y <= ymax; y++) {
        for (let x = xmin; x <= xmax; x++) {
            if (isPointInPolygon(x, y, polygon)) {
                const point = document.createElement('div');
                point.classList.add('point');
                point.dataset.x = x;
                point.dataset.y = y;
                
                // Posiciona o ponto de acordo com as coordenadas (ajustado pela escala)
                point.style.left = `${x * scale}px`;
                point.style.top = `${y * scale}px`;

                point.addEventListener('click', function () {
                    point.classList.toggle('selected');
                    checkSelection();
                });

                map.appendChild(point);
            }
        }
    }

    function checkSelection() {
        const hasSelected = map.querySelector('.selected') !== null;
        submitButton.disabled = !hasSelected;
    }

    // Função para coletar os pontos selecionados
    function getSelectedPoints() {
        const selectedPoints = [];
        map.querySelectorAll('.point.selected').forEach(point => {
            selectedPoints.push({
                x: point.dataset.x,
                y: point.dataset.y
            });
        });
        return selectedPoints;
    }

    // Envia os dados para o servidor
    submitButton.addEventListener('click', function () {
        const selectedPoints = getSelectedPoints();
        fetch('/submit-trajectory', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ trajectory: selectedPoints })
        })
        .then(response => response.json())
        .then(data => {
            alert('Trajetória enviada com sucesso!');
        })
        .catch(error => {
            console.error('Erro ao enviar a trajetória:', error);
        });
    });

    // Limpa a trajetória selecionada
    clearButton.addEventListener('click', function () {
        document.querySelectorAll('.point').forEach(point => {
            point.classList.remove('selected');
        });
        checkSelection();
    });
</script>

</body>
</html>
